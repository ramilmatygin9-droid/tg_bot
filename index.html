<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Mockup</title>
    <style>
        :root {
            --bg-color: #000;
            --sheet-bg: #1c1c1e;
            --text-main: #fff;
            --accent-blue: #007aff;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: -apple-system, sans-serif;
            overflow: hidden; /* Чтобы не скроллился сам экран телефона */
        }

        .phone-mockup {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            background: url('photo_2026-05-05_15-06-07.jpg') no-repeat center top;
            background-size: contain;
        }

        /* Зона поиска поверх изображения */
        .search-trigger {
            position: absolute;
            top: 15%; /* Подгоните под область "Поиск" на вашем фото */
            left: 5%;
            width: 90%;
            height: 45px;
        }

        #realSearch {
            width: 100%;
            height: 100%;
            background: rgba(28, 28, 30, 0.8);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 0 15px;
            box-sizing: border-box;
            outline: none;
        }

        /* Зона клика "Мой счет" */
        .account-trigger {
            position: absolute;
            top: 61%; /* Подгоните под блок счета на вашем фото */
            left: 5%;
            width: 90%;
            height: 80px;
            cursor: pointer;
        }

        /* Плавное меню (Bottom Sheet) */
        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 85vh;
            background: var(--sheet-bg);
            border-radius: 20px 20px 0 0;
            transition: bottom 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 100;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.open {
            bottom: 0;
        }

        .handle {
            width: 40px;
            height: 5px;
            background: #3a3a3c;
            border-radius: 10px;
            margin: 12px auto;
        }

        .sheet-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 90;
        }

        /* Стили контента внутри меню */
        .section { margin-bottom: 25px; border-bottom: 1px solid #2c2c2e; padding-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin: 12px 0; }
        .label { color: #8e8e93; }
        .qr-placeholder { background: white; width: 150px; height: 150px; margin: 10px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .btn-more { color: var(--accent-blue); font-weight: 600; cursor: pointer; }
        
        .sub-menu { display: none; padding-top: 10px; background: #2c2c2e; border-radius: 10px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="phone-mockup">
    <!-- Поле поиска -->
    <div class="search-trigger">
        <input type="text" id="realSearch" placeholder="Поиск по операциям...">
    </div>

    <!-- Кликабельная зона счета -->
    <div class="account-trigger" onclick="openSheet()"></div>
</div>

<!-- Затемнение фона -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Выезжающее меню -->
<div class="bottom-sheet" id="sheet">
    <div class="handle"></div>
    <div class="sheet-content">
        <h2>Мой счет</h2>
        
        <div class="section">
            <div class="row"><span>Карта *2686</span> <strong>5,41 ₽</strong></div>
            <div class="row"><span class="label">Баллы лояльности</span> <span>124 б.</span></div>
        </div>

        <div class="section">
            <h3>Операции за май</h3>
            <div class="row"><span>Супермаркеты</span> <span>-850 ₽</span></div>
            <div class="row"><span>Аптеки</span> <span>-309 ₽</span></div>
        </div>

        <div class="section" style="text-align: center;">
            <h3>QR-код для пополнения</h3>
            <div class="qr-placeholder">QR CODE</div>
            <p class="label">Покажите этот код для перевода</p>
        </div>

        <div class="section">
            <div class="btn-more" onclick="toggleExtra()">Дополнительно ▼</div>
            <div id="extraMenu" class="sub-menu">
                <div class="row"><span class="label">Лимит на переводы</span> <span>150 000 ₽</span></div>
                <div class="row"><span class="label">Лимит на снятие</span> <span>50 000 ₽</span></div>
                <div class="row"><span class="label">Тариф</span> <span>Black Premium</span></div>
                <div class="row"><span class="label">Реквизиты счета</span> <span style="color:var(--accent-blue)">Копировать</span></div>
            </div>
        </div>
        
        <button onclick="closeSheet()" style="width:100%; padding:15px; border-radius:12px; border:none; background:#2c2c2e; color:white; font-size:16px;">Закрыть</button>
    </div>
</div>

<script>
    const sheet = document.getElementById('sheet');
    const overlay = document.getElementById('overlay');
    const extraMenu = document.getElementById('extraMenu');

    function openSheet() {
        sheet.classList.add('open');
        overlay.style.display = 'block';
    }

    function closeSheet() {
        sheet.classList.remove('open');
        overlay.style.display = 'none';
    }

    function toggleExtra() {
        if (extraMenu.style.display === 'block') {
            extraMenu.style.display = 'none';
        } else {
            extraMenu.style.display = 'block';
        }
    }

    // Имитация поиска
    document.getElementById('realSearch').addEventListener('input', (e) => {
        console.log("Ищем:", e.target.value);
        // Здесь можно добавить фильтрацию списка операций
    });
</script>

</body>
</html>
